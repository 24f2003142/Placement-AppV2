<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration | Placyx</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #6a0dad, #7f3fbf, #3f51b5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .student-register-card {
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div id="student-registration-app" class="card shadow student-register-card">
    <div class="card-body p-4">

        <h3 class="text-center mb-4 fw-bold text-primary">
            Student Registration
        </h3>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <div v-if="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

        <form ref="form" @submit.prevent="submitForm">
            <input class="form-control mb-2" name="name" v-model="formData.name" placeholder="Full Name" required>
            <input class="form-control mb-2" name="roll_no" v-model="formData.roll_no" placeholder="Roll Number">
            <input class="form-control mb-2" name="branch" v-model="formData.branch" placeholder="Branch">
            <input class="form-control mb-2" name="cgpa" v-model="formData.cgpa" type="number" step="0.01" placeholder="CGPA">
            <input class="form-control mb-2" name="year_of_study" v-model="formData.yearOfStudy" type="number" min="1" placeholder="Year of Study">
            <input class="form-control mb-2" name="email" v-model="formData.email" type="email" placeholder="Email" required>
            <input class="form-control mb-3" name="password" v-model="formData.password" type="password" placeholder="Password" required>

            <button class="btn btn-primary w-100" :disabled="submitting">
                <span v-if="submitting">Registering…</span>
                <span v-else>Register</span>
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100 mt-2">Back</a>
        </form>

    </div>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                formData: {
                    name: '',
                    roll_no: '',
                    branch: '',
                    cgpa: '',
                    yearOfStudy: '',
                    email: '',
                    password: ''
                },
                submitting: false,
                errorMessage: ''
            };
        },
        methods: {
            async submitForm() {
                this.errorMessage = '';
                this.submitting = true;

                const form = this.$refs.form;
                const formData = new FormData(form);

                try {
                    const response = await fetch("{{ url_for('register_student') }}", {
                        method: 'POST',
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: new URLSearchParams(formData)
                    });

                    if (!response.ok && response.status !== 302) {
                        throw new Error('Registration failed');
                    }

                    if (response.redirected || response.url) {
                        window.location.href = response.url;
                        return;
                    }

                    window.location.href = "{{ url_for('student_dashboard') }}";
                } catch (error) {
                    this.errorMessage = error.message || 'Registration failed';
                } finally {
                    this.submitting = false;
                }
            }
        }
    }).mount('#student-registration-app');
</script>

</body>
</html>

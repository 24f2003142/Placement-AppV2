{% extends "layouts/base_dashboard.html" %}

{% block title %}Edit Profile{% endblock %}

    {% block sidebar %}
            {% if current_user.student.profile_photo %}
                <div class="text-center py-3">
                    <img src="{{ url_for('static', filename='uploads/' + current_user.student.profile_photo) }}"
                        class="rounded-circle"
                        width="100"
                        height="100"
                        style="object-fit: cover;">
                </div>
                {% else %}
                <div class="text-center py-3">
                    <div class="bg-light rounded-circle mx-auto"
                        style="width:100px; height:100px;"></div>
                </div>
            {% endif %}
        <a href="/student/dashboard">📊 Dashboard</a>
        <a href="/student/applications">📄 My Applications</a>
        <a href="/student/profile">⚙ Edit Profile</a>
        <a href="/logout">🚪 Logout</a>
        {% endblock %}
{% block content %}
<h3>Edit Profile</h3>

<form method="POST" enctype="multipart/form-data" class="card p-4">

    <label>Branch</label>
    <input class="form-control mb-3" name="branch" value="{{ student.branch }}">

    <label>CGPA</label>
    <input class="form-control mb-3" name="cgpa" value="{{ student.cgpa }}">

    <label>New Password</label>
    <input type="password" class="form-control mb-3" name="password">

    <label>Profile Photo</label>
    <input type="file" class="form-control mb-3" name="photo" accept=".jpg,.jpeg,.png">

    <div class="form-group">
    <label for="resume">Resume Upload</label>
    <input
      type="file"
      id="resume"
      name="resume"
      class="form-control"
      accept=".pdf,.doc,.docx"
    />
    <div><label for="spacing"> </label></div>

    <button class="btn btn-primary">Save Changes</button>

</form>
{% endblock %}

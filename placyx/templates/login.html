<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placyx | Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #6a0dad, #7f3fbf, #3f51b5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div id="login-app" class="card shadow login-card">
    <div class="card-body p-4">

        <h3 class="text-center mb-4 fw-bold text-primary">
            Placyx Login
        </h3>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-danger">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <div v-if="errorMessage" class="alert alert-danger">{% raw %}{{ errorMessage }}{% endraw %}</div>

        <form ref="form" @submit.prevent="submitForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                    type="email"
                    name="email"
                    v-model="formData.email"
                    class="form-control"
                    placeholder="Enter email"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    v-model="formData.password"
                    class="form-control"
                    placeholder="Enter password"
                    required
                >
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary" :disabled="submitting">
                    <span v-if="submitting">Signing in…</span>
                    <span v-else>Login</span>
                </button>
            </div>

            <div class="d-grid mt-2">
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                    Back
                </a>
            </div>
        </form>
        <hr>

        <div class="text-center small">
            <p class="mb-1">New user?</p>
            <a href="/register/student">Student Registration</a> |
            <a href="/register/company">Company Registration</a>
        </div>

    </div>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                formData: {
                    email: '',
                    password: ''
                },
                submitting: false,
                errorMessage: ''
            };
        },
        methods: {
            async submitForm() {
                this.errorMessage = '';
                this.submitting = true;

                const form = this.$refs.form;
                const formData = new FormData(form);

                try {
                    const response = await fetch("{{ url_for('login') }}", {
                        method: 'POST',
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: new URLSearchParams(formData)
                    });

                    const data = await response.json().catch(() => null);

                    if (!response.ok) {
                        throw new Error(data?.message || 'Login failed');
                    }

                    if (data?.redirect) {
                        window.location.href = data.redirect;
                        return;
                    }

                    window.location.reload();
                } catch (error) {
                    this.errorMessage = error.message || 'Login failed';
                } finally {
                    this.submitting = false;
                }
            }
        }
    }).mount('#login-app');
</script>

</body>
</html>

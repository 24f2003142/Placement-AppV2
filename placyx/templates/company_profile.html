{% extends "layouts/base_dashboard.html" %}

{% block title %}Edit Company Profile{% endblock %}
    {% block sidebar %}
        {% if current_user.company.logo %}
        <div class="text-center py-3">
            <img src="{{ url_for('static', filename='uploads/' + current_user.company.logo) }}"
                width="140"
                class="img-fluid">
        </div>
        {% endif %}
        <a href="/company/dashboard">📊 Dashboard</a>
        <a href="/company/job/create">➕ Post Job</a>
        <a href="/company/jobs">📄 My Jobs</a>
        <a href="/company/profile">⚙ Edit Profile</a>
        <a href="/logout">🚪 Logout</a>
    {% endblock %}
{% block content %}
<h3>Edit Company Profile</h3>

<form method="POST" enctype="multipart/form-data" class="card p-4">

    <label>Website</label>
    <input class="form-control mb-3" name="website" value="{{ company.website }}">

    <label>HR Email</label>
    <input class="form-control mb-3" name="hr_email" value="{{ company.hr_email }}">

    <label>New Password</label>
    <input type="password" class="form-control mb-3" name="password">

    <label>Company Logo</label>
    <input type="file" class="form-control mb-3" name="logo">

    <button class="btn btn-primary">Save Changes</button>

</form>
{% endblock %}

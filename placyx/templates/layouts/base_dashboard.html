<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Placyx{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f4f6fb;
            font-family: "Segoe UI", sans-serif;
        }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #6a0dad, #7f3fbf, #3f51b5);
            color: white;
            position: fixed;
        }

        .sidebar h4 {
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
        }

        .sidebar a:hover {
            background-color: rgba(255,255,255,0.15);
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>Placyx</h4>
    {% block sidebar %}{% endblock %}
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

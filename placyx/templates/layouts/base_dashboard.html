<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Placyx{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6fb;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #6a0dad, #7f3fbf, #3f51b5);
            color: white;
            position: fixed;
        }

        .sidebar h4 {
            padding: 20px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 22px;
            display: block;
        }

        .sidebar a:hover {
            background-color: rgba(255,255,255,0.15);
        }

        /* Main content */
        .content {
            margin-left: 260px;
            padding: 30px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .back-btn {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>Placyx</h4>

    {% block sidebar %}
    <!-- Sidebar injected per role -->
    {% endblock %}
</div>

<div class="content">

    <!-- Back Button -->
    {% if back_url %}
    <a href="{{ back_url }}" class="btn btn-outline-secondary back-btn">
        ⬅ Back to Dashboard
    </a>
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>

</html>

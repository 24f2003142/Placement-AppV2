{% extends "layouts/base_dashboard.html" %}
{% block title %}Create Job | Placyx{% endblock %}

{% block sidebar %}
    {% if current_user.company.logo %}
      <div class="text-center py-3">
          <img src="{{ url_for('static', filename='uploads/' + current_user.company.logo) }}"
              width="140"
              class="img-fluid">
      </div>
    {% endif %}
    <a href="/company/dashboard">📊 Dashboard</a>
    <a href="/company/job/create">➕ Post Job</a>
    <a href="/company/jobs">📄 My Jobs</a>
    <a href="/company/profile">⚙ Edit Profile</a>
    <a href="/logout">🚪 Logout</a>
{% endblock %}

{% block content %}
  <div class="container mt-5">
      <div class="card p-4 mx-auto" style="max-width: 600px;">
        <h3 class="mb-3 text-center">Create Job Post</h3>

        <form method="POST">
          <input class="form-control mb-2" name="title" placeholder="Job Title" required>
          <textarea class="form-control mb-2" name="description" placeholder="Job Description"></textarea>
          <textarea class="form-control mb-2" name="eligibility" placeholder="Eligibility Criteria"></textarea>
          <input class="form-control mb-3" type="date" name="deadline" required>

          <button class="btn btn-primary w-100">Submit for Approval</button>
        </form>
      </div>
  </div>
{% endblock %}
